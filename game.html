<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Défi — Immersium</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="immersium-shared.css">

<style>
/* ═══════════════════════════════════════════════════
   GAME PAGE — Caribbean Editorial
   ═══════════════════════════════════════════════════ */

/* SHELL */
.game-shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
.game-topbar{display:flex;align-items:center;gap:16px;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--line);flex-shrink:0;z-index:40}
.game-topbar-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.game-back{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:var(--bg);border:1px solid var(--line);color:var(--ink);transition:all .15s;flex-shrink:0}
.game-back:hover{background:var(--paper-hover);border-color:var(--sand)}
.game-crumb{display:flex;align-items:baseline;gap:8px;font-size:13px;color:var(--ink-soft);min-width:0;overflow:hidden}
.game-crumb .ord{font-family:var(--f-display);font-style:italic;font-size:11px;color:var(--sand);letter-spacing:.18em;font-weight:500;flex-shrink:0}
.game-crumb .slash{color:var(--line);flex-shrink:0}
.game-crumb .ch{font-family:var(--f-mono);font-size:11.5px;color:var(--ink-mute);flex-shrink:0}
.game-progress{display:flex;align-items:center;gap:8px;flex-shrink:0}
.game-progress span{font-family:var(--f-mono);font-size:11px;color:var(--cobalt);font-weight:600}
.game-progress .bar{width:100px;height:5px;background:var(--bg-alt);border-radius:99px;overflow:hidden}
.game-progress .fill{height:100%;background:var(--cobalt);border-radius:99px;transition:width .4s}
.game-topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}

/* MAIN LAYOUT */
.game-main{display:grid;grid-template-columns:240px 1fr 260px;flex:1;overflow:hidden}

/* SIDEBAR LEFT */
.game-side{padding:20px;overflow-y:auto;background:var(--paper);border-right:1px solid var(--line)}
.game-side h5{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-mute);font-weight:600;margin-bottom:10px}
.ch-list{display:flex;flex-direction:column;gap:2px;margin-bottom:20px}
.ch-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;font-size:12.5px;color:var(--ink-soft);cursor:pointer;transition:background .12s,color .12s}
.ch-item:hover{background:var(--bg-alt);color:var(--ink)}
.ch-item.current{background:var(--cobalt);color:#fff;font-weight:600}
.ch-item.done{color:var(--ink-mute)}
.ch-item.done .ch-num{background:var(--bg-alt);color:var(--ink-mute);border-color:var(--line)}
.ch-item.locked{color:var(--ink-mute);opacity:.5;cursor:default}
.ch-item.locked .ch-num{position:relative}
.ch-item.locked .ch-num::after{content:'\1F512';font-size:9px;position:absolute;right:-2px;bottom:-2px}

/* PAYWALL OVERLAY */
.paywall-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(14,26,43,.85);backdrop-filter:blur(8px);animation:pw-in .3s}
@keyframes pw-in{from{opacity:0}to{opacity:1}}
.paywall-box{background:var(--paper);border-radius:20px;max-width:520px;width:92%;padding:48px 40px;text-align:center;box-shadow:0 24px 80px -16px rgba(0,0,0,.5);position:relative}
.paywall-box .pw-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--orange),#FF8659);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
.paywall-box h2{font-family:var(--f-display);font-size:28px;font-weight:500;letter-spacing:-.02em;margin-bottom:8px}
.paywall-box h2 em{font-style:italic;color:var(--marine)}
.paywall-box .pw-sub{font-size:14px;color:var(--ink-soft);line-height:1.6;margin-bottom:28px}
.paywall-box .pw-plans{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.paywall-box .pw-plan{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border:1px solid var(--line);border-radius:12px;text-decoration:none;color:var(--ink);transition:all .15s}
.paywall-box .pw-plan:hover{border-color:var(--orange);background:rgba(255,107,53,.05)}
.paywall-box .pw-plan .pw-plan-name{font-weight:600;font-size:14px}
.paywall-box .pw-plan .pw-plan-desc{font-size:12px;color:var(--ink-mute);margin-top:2px}
.paywall-box .pw-plan .pw-plan-price{font-family:var(--f-display);font-size:20px;font-weight:500;color:var(--orange);white-space:nowrap}
.paywall-box .pw-plan.featured{border-color:var(--orange);background:rgba(255,107,53,.06)}
.paywall-box .pw-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--paper);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--ink-mute);transition:all .12s}
.paywall-box .pw-close:hover{background:var(--bg-alt);color:var(--ink)}
.paywall-box .pw-free{font-size:12px;color:var(--ink-mute);margin-top:12px}
.paywall-box .pw-free a{color:var(--cobalt);text-decoration:underline}
.ch-num{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-size:12px;font-weight:500;background:var(--bg);border:1px solid var(--line);flex-shrink:0}
.ch-item.current .ch-num{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff}

/* CONTENT AREA */
.game-content{padding:32px 40px;overflow-y:auto}
.game-hero{margin-bottom:32px}
.game-hero .ord{font-family:var(--f-display);font-style:italic;font-size:12px;color:var(--sand);letter-spacing:.22em;text-transform:uppercase;font-weight:500;margin-bottom:8px}
.game-hero h1{font-family:var(--f-display);font-size:36px;font-weight:500;letter-spacing:-.025em;line-height:1.1}
.game-hero h1 em{font-style:italic;color:var(--marine);font-weight:500}
.game-hero .meta{display:flex;gap:18px;margin-top:14px;font-size:12px;color:var(--ink-mute)}
.game-hero .meta span{display:flex;align-items:center;gap:5px}

/* BRIEFING */
.game-briefing{padding:20px 24px;background:var(--bg);border-left:3px solid var(--sand);border-radius:0 var(--r) var(--r) 0;margin-bottom:28px}
.game-briefing .from{font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-mute);font-weight:600;margin-bottom:10px}
.game-briefing .content{font-size:14px;line-height:1.65;color:var(--ink-soft)}

/* COMMUNICATIONS */
.comm-block{margin-bottom:20px;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--line)}
.comm-header{display:flex;align-items:center;gap:10px;padding:12px 18px;font-size:12px;font-weight:600;letter-spacing:.05em}
.comm-header .comm-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.comm-header .comm-from{font-size:13px;font-weight:600}
.comm-header .comm-channel{font-size:10px;letter-spacing:.15em;text-transform:uppercase;opacity:.7;margin-left:auto}
.comm-body{padding:16px 20px;font-size:13.5px;line-height:1.65;color:var(--ink-soft);background:var(--paper)}
.comm-body .comm-subject{font-weight:600;color:var(--ink);margin-bottom:8px;font-size:12px}
.comm-email .comm-header{background:rgba(0,85,255,.06);color:var(--cobalt)}
.comm-email .comm-icon{background:rgba(0,85,255,.12);color:var(--cobalt)}
.comm-teams .comm-header{background:rgba(88,86,214,.06);color:#5856D6}
.comm-teams .comm-icon{background:rgba(88,86,214,.12);color:#5856D6}
.comm-visio .comm-header{background:rgba(13,148,136,.06);color:#0D9488}
.comm-visio .comm-icon{background:rgba(13,148,136,.12);color:#0D9488}
.comm-notif .comm-header{background:rgba(220,38,38,.06);color:#DC2626}
.comm-notif .comm-icon{background:rgba(220,38,38,.12);color:#DC2626}
.comm-vocal .comm-header{background:rgba(245,158,11,.06);color:#D97706}
.comm-vocal .comm-icon{background:rgba(245,158,11,.12);color:#D97706}

/* ── Knowledge base ── */
.kb-list { display: flex; flex-direction: column; gap: 16px; }
.kb-card {
  background: linear-gradient(135deg, #F8FAFF 0%, #F0F4FF 100%);
  border: 1px solid #C7D7FF; border-radius: var(--r-lg); overflow: hidden;
}
.kb-card-head { padding: 14px 20px 10px; border-bottom: 1px solid #C7D7FF; display: flex; align-items: center; gap: 10px; }
.kb-card-head h3 { font-size: 15px; font-weight: 700; color: #1E3A8A; margin: 0; }
.kb-tag { padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; background: #DBEAFE; color: #1E40AF; }
.kb-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.kb-row { display: grid; grid-template-columns: 90px 1fr; gap: 10px; align-items: baseline; }
.kb-row-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #64748B; padding-top: 2px; }
.kb-row-content { font-size: 14px; color: var(--ink); line-height: 1.6; }
.kb-row-content strong { color: #1E3A8A; }

/* ── Progress steps within challenge ── */
.phase-steps {
  display: flex; align-items: center; gap: 0; margin-bottom: 28px;
}
.phase-step {
  display: flex; align-items: center; flex: 1;
}
.phase-step-dot {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--ink-mute); flex-shrink: 0;
  transition: all .25s;
}
.phase-step.done .phase-step-dot { background: #16A34A; border-color: #16A34A; color: #fff; }
.phase-step.active .phase-step-dot { background: var(--cobalt); border-color: var(--cobalt); color: #fff; }
.phase-step-line { flex: 1; height: 2px; background: var(--line); margin: 0 4px; transition: background .25s; }
.phase-step.done + .phase-step .phase-step-line,
.phase-step.done .phase-step-line { background: #16A34A; }
.phase-step-label { font-size: 10px; color: var(--ink-mute); text-align: center; margin-top: 4px; }
.phase-step-wrap { display: flex; flex-direction: column; align-items: center; }

/* DOCUMENT */
.game-doc{padding:24px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:28px;font-size:14px;line-height:1.65;color:var(--ink-soft);max-height:400px;overflow-y:auto}
.game-doc h3,.game-doc h4{color:var(--ink);margin:16px 0 8px}
.game-doc p{margin-bottom:10px}
.game-doc ul,.game-doc ol{margin:8px 0 12px 20px}
.game-doc li{margin-bottom:4px}
.game-doc table{width:100%;border-collapse:collapse;margin:12px 0}
.game-doc th,.game-doc td{padding:8px 12px;border:1px solid var(--line);font-size:13px;text-align:left}
.game-doc th{background:var(--bg);font-weight:600;color:var(--ink)}

/* QUESTIONS */
.game-q{margin-bottom:28px}
.game-q .label{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.game-q .label .type-tag{color:var(--cobalt)}
.game-q h3{font-family:var(--f-display);font-size:22px;font-weight:500;letter-spacing:-.01em;line-height:1.25;margin-bottom:16px}
.choice-list{display:flex;flex-direction:column;gap:8px}
.choice{display:flex;gap:12px;padding:14px 16px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;transition:all .15s}
.choice:hover{background:var(--paper-hover);border-color:var(--sand)}
.choice.selected{background:rgba(0,0,128,.06);border-color:var(--cobalt)}
.choice.correct{background:rgba(46,125,50,.08);border-color:#2E7D32}
.choice.incorrect{background:rgba(211,47,47,.06);border-color:var(--coral)}
.ch-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:2px;position:relative;transition:all .15s}
.choice.selected .ch-radio{border-color:var(--cobalt);background:var(--cobalt)}
.choice.selected .ch-radio::after{content:"";position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
.choice.correct .ch-radio{border-color:#2E7D32;background:#2E7D32}
.choice.correct .ch-radio::after{content:"";position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
.choice.incorrect .ch-radio{border-color:var(--coral);background:var(--coral)}
.choice.incorrect .ch-radio::after{content:"";position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
.ch-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;margin-top:2px;position:relative;transition:all .15s}
.choice.selected .ch-check{border-color:var(--cobalt);background:var(--cobalt)}
.choice.selected .ch-check::after{content:"\2713";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:12px;font-weight:700}
.choice .text{font-size:13.5px;line-height:1.5;color:var(--ink-soft)}
.choice .text strong{color:var(--ink);font-weight:600}

/* ORDERING */
.ordering-list{display:flex;flex-direction:column;gap:6px}
.ordering-item{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r);cursor:grab;transition:all .15s;user-select:none}
.ordering-item:hover{background:var(--paper-hover);border-color:var(--sand)}
.ordering-item.dragging{opacity:.5;border-color:var(--cobalt);background:rgba(0,85,255,.06)}
.ordering-item .ord-num{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-size:13px;font-weight:600;background:var(--bg-alt);color:var(--ink-mute);flex-shrink:0}
.ordering-item .ord-text{font-size:13.5px;line-height:1.4;color:var(--ink-soft);flex:1}
.ordering-item .ord-handle{display:flex;flex-direction:column;gap:1px;opacity:.4;flex-shrink:0;cursor:grab}
.ordering-item .ord-handle span{display:block;width:14px;height:2px;background:var(--ink-mute);border-radius:1px}
.ordering-item.correct-pos{background:rgba(46,125,50,.08);border-color:#2E7D32}
.ordering-item.correct-pos .ord-num{background:#2E7D32;color:#fff}
.ordering-item.incorrect-pos{background:rgba(211,47,47,.06);border-color:var(--coral)}
.ordering-item.incorrect-pos .ord-num{background:var(--coral);color:#fff}
.ordering-btns{display:flex;gap:4px;flex-shrink:0}
.ordering-btns button{width:28px;height:28px;border:1px solid var(--line);border-radius:6px;background:var(--paper);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-mute);transition:all .12s;font-size:14px;padding:0}
.ordering-btns button:hover{background:var(--bg-alt);color:var(--ink);border-color:var(--sand)}

/* MATCHING */
.matching-zone{display:flex;gap:20px;flex-wrap:wrap}
.matching-col{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px}
.matching-col h6{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mute);font-weight:600;margin-bottom:6px}
.matching-item{padding:12px 16px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r);font-size:13px;line-height:1.4;color:var(--ink-soft);cursor:pointer;transition:all .15s}
.matching-item:hover{border-color:var(--sand);background:var(--paper-hover)}
.matching-item.selected{border-color:var(--cobalt);background:rgba(0,85,255,.06);color:var(--ink)}
.matching-item.matched{border-color:#2E7D32;background:rgba(46,125,50,.08);cursor:default}
.matching-item.matched::before{content:"\2713 ";color:#2E7D32;font-weight:700}
.matching-item.error{border-color:var(--coral);background:rgba(211,47,47,.06)}
.matching-pairs-display{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.matching-pair-row{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r);font-size:12.5px}
.matching-pair-row .mp-left{font-weight:600;color:var(--ink);flex:1}
.matching-pair-row .mp-arrow{color:var(--ink-mute);flex-shrink:0}
.matching-pair-row .mp-right{color:var(--ink-soft);flex:1;text-align:right}
.matching-pair-row.mp-correct{border-color:#2E7D32;background:rgba(46,125,50,.06)}
.matching-pair-row.mp-incorrect{border-color:var(--coral);background:rgba(211,47,47,.06)}

/* CHECKBOX (uses .choice-list + .ch-check already defined) */

/* TUTO */
.tuto-video{margin-bottom:20px;border-radius:var(--r-lg);overflow:hidden;background:#000;position:relative;padding-bottom:56.25%;height:0}
.tuto-video iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.tuto-link{display:inline-flex;align-items:center;gap:8px;padding:14px 20px;background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.15);border-radius:var(--r);color:#DC2626;font-size:13px;font-weight:600;margin-bottom:16px;text-decoration:none;transition:all .15s}
.tuto-link:hover{background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.25)}

/* TOOL / SCREENSHOT */
.tool-instruction{padding:18px 22px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:16px;font-size:13.5px;line-height:1.65;color:var(--ink-soft)}
.tool-instruction h6{font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--cobalt);font-weight:600;margin-bottom:10px}
.tool-instruction ol{margin:8px 0 0 20px;padding:0}
.tool-instruction li{margin-bottom:6px}
.tool-link{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;background:var(--cobalt);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:16px;transition:all .15s}
.tool-link:hover{opacity:.9}

/* FEEDBACK */
.feedback{padding:14px 18px;border-radius:var(--r);margin-top:8px;font-size:13px;line-height:1.55;display:none}
.feedback.show{display:block}
.feedback.correct{background:rgba(46,125,50,.08);border:1px solid rgba(46,125,50,.2);color:#1B5E20}
.feedback.incorrect{background:rgba(211,47,47,.06);border:1px solid rgba(211,47,47,.15);color:#B71C1C}

/* FREE RESPONSE */
.free-textarea{width:100%;min-height:120px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--r);font-family:var(--f-body);font-size:14px;line-height:1.6;color:var(--ink);background:var(--bg);resize:vertical;transition:border-color .15s}
.free-textarea:focus{outline:none;border-color:var(--cobalt)}
.free-textarea:disabled{opacity:.6;cursor:not-allowed;background:var(--bg-alt)}


/* FREE RESPONSE - Rich Editor */
.rich-editor-wrap{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:border-color .15s;background:var(--bg)}
.rich-editor-wrap:focus-within{border-color:var(--cobalt)}
.rich-editor-wrap.disabled{opacity:.6;pointer-events:none;background:var(--bg-alt)}
.re-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:2px;padding:6px 8px;background:var(--bg-alt);border-bottom:1px solid var(--line)}
.re-toolbar button{display:inline-flex;align-items:center;justify-content:center;width:30px;height:28px;border:none;background:transparent;border-radius:4px;cursor:pointer;color:var(--ink-soft);font-size:14px;font-weight:600;transition:all .12s}
.re-toolbar button:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.re-toolbar button.active{background:var(--cobalt);color:#fff}
.re-toolbar .re-sep{width:1px;height:20px;background:var(--line);margin:0 4px}
.re-toolbar .re-upload-btn{width:auto;padding:0 10px;gap:5px;font-size:11px;font-weight:600;letter-spacing:.03em}
.re-body{min-height:120px;max-height:400px;overflow-y:auto;padding:14px 16px;font-family:var(--f-body);font-size:14px;line-height:1.7;color:var(--ink);outline:none}
.re-body:empty::before{content:attr(data-placeholder);color:var(--ink-mute);pointer-events:none}
.re-body ul,.re-body ol{margin:4px 0 4px 20px;padding:0}
.re-body li{margin-bottom:2px}
.re-body blockquote{margin:8px 0;padding:8px 14px;border-left:3px solid var(--cobalt);background:rgba(0,85,255,.04);border-radius:0 var(--r) var(--r) 0}
.re-attachments{padding:8px 12px;border-top:1px solid var(--line);background:var(--bg-alt)}
.re-attachments:empty{display:none}

<!-- ═══════════════════════════════════════════════════════════════════
     SCRIPT : chargement dynamique des défis depuis catalogue.json
     Supporte : mcq, ordering, matching, checkbox, free, tuto, tool, screenshot
     ═══════════════════════════════════════════════════════════════════ -->
<script>
(async function() {
  const API_BASE = 'https://immersium-api.mx-cosaque.workers.dev';

  // ─── Paramètres URL ──────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const gameId = params.get('game') || 'lumio';
  let currentIdx = parseInt(params.get('ch'));
  if (isNaN(currentIdx)) currentIdx = 0; // Default to onboarding

  // ─── Numéros catalogue ───────────────────────────────────────────
  const CATALOG_NUMS = window.IMM_CATALOG_NUMS || {};

  // ─── Charger le catalogue ────────────────────────────────────────
  let catalogue = null;
  try {
    // Charger depuis l'API D1 (modifiable via le dashboard admin)
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000); // 5s timeout
    const resp = await fetch(API_BASE + '/api/catalogue', { signal: ctrl.signal });
    clearTimeout(timer);
    if (!resp.ok) throw new Error('API error ' + resp.status);
    catalogue = await resp.json();
  } catch(e) {
    console.warn('API catalogue indisponible, fallback sur catalogue.json local:', e.message);
    try {
      const resp2 = await fetch('/data/catalogue.json?v=' + Date.now());
      catalogue = await resp2.json();
    } catch(e2) {
      document.getElementById('loading-msg').innerHTML = `
        <h2>Erreur de chargement</h2>
        <p>Impossible de charger les données du catalogue.</p>
        <a href="catalogue.html" class="btn btn-primary" style="margin-top:16px">Retour au catalogue</a>`;
      return;
    }
  }

  // Support catalogue en format tableau (array) ou objet
  let game = null;
  if (Array.isArray(catalogue)) {
    game = catalogue.find(g => g.game_id === gameId || g.id === gameId || g.slug === gameId);
  } else {
    game = catalogue[gameId];
  }
  if (!game) {
    document.getElementById('loading-msg').innerHTML = `
      <h2>Simulation introuvable</h2>
      <p>La simulation « ${gameId} » n'existe pas dans le catalogue.</p>
      <a href="catalogue.html" class="btn btn-primary" style="margin-top:16px">Retour au catalogue</a>`;
    return;
  }

  // ─── Enrichir avec les métadonnées vidéo depuis l'API D1 ────────
  try {
    const simResp = await fetch(API_BASE + '/api/simulations/' + gameId, { signal: AbortSignal.timeout(5000) });
    if (simResp.ok) {
      const simData = await simResp.json();
      const sim = simData.data || simData;
      if (sim.intro_video_url) game.intro_video_url = sim.intro_video_url;
      if (sim.intro_video_title) game.intro_video_title = sim.intro_video_title;
      if (sim.intro_video_poster) game.intro_video_poster = sim.intro_video_poster;
    }
  } catch(e) { console.warn('Métadonnées vidéo indisponibles:', e.message); }

  // ─── Données du jeu ──────────────────────────────────────────────
  const sessions = game.sessions || [];
  const challengesData = game.challenges_data || {};
  const totalChallenges = game.challenges || 21;
  const gameColor = game.color || '#000080';
  const gameNum = game.num || CATALOG_NUMS[gameId] || '??';
  const gameName = (game.title || gameId.toUpperCase()).split(' — ')[0];
  const gameFullTitle = game.title || gameId.toUpperCase();
  const gameSub = game.subtitle || '';

  // ─── Construire la liste plate ordonnée des défis (1-indexed) ────
  const flatChallenges = [];
  sessions.forEach(s => {
    (s.challenges || []).forEach(ch => {
      flatChallenges.push({
        idx: flatChallenges.length + 1,
        rawId: ch.id,
        title: ch.title || 'Défi ' + (flatChallenges.length + 1),
        sessionTitle: s.title || 'Session ' + s.id,
        sessionId: s.id
      });
    });
  });

  // ─── Extraire le numéro d'un ID brut ─────────────────────────────
  function extractNum(rawId) {
    if (typeof rawId === 'number') return rawId;
    const m = String(rawId).match(/(\d+)$/);
    return m ? parseInt(m[1]) : null;
  }

  // ─── Accéder aux données brutes d'un défi (incluant knowledge_notions) ──
  function getChallengeRaw(idx) {
    const ch = flatChallenges[idx - 1];
    if (!ch) return null;
    const num = extractNum(ch.rawId);
    if (num === null) return null;
    const key1 = `${gameId}_ch${num}`;
    const key2 = String(ch.rawId);
    const key3 = `ch${num}`;
    return challengesData[key1] || challengesData[key2] || challengesData[key3] || null;
  }

  // ─── Obtenir les knowledge_notions d'un défi ──────────────────────
  function getKnowledgeNotions(idx) {
    const raw = getChallengeRaw(idx);
    if (!raw) return [];
    const kn = raw.knowledge_notions;
    if (Array.isArray(kn) && kn.length > 0) return kn;
    return [];
  }

  // ─── Rendu des cartes de notions ──────────────────────────────────
  function renderKnowledgeBase(kb) {
    if (!kb || kb.length === 0) return '';
    return `<div class="kb-list">${kb.map(k => `
      <div class="kb-card">
        <div class="kb-card-head">
          <span class="kb-tag">Notion</span>
          <h3>${esc(k.title)}</h3>
        </div>
        <div class="kb-body">
          ${k.definition ? `<div class="kb-row"><div class="kb-row-label">D\u00e9finition</div><div class="kb-row-content">${esc(k.definition)}</div></div>` : ''}
          ${k.analogy ? `<div class="kb-row"><div class="kb-row-label">Analogie</div><div class="kb-row-content">${esc(k.analogy)}</div></div>` : ''}
          ${k.example ? `<div class="kb-row"><div class="kb-row-label">Exemple</div><div class="kb-row-content">${esc(k.example)}</div></div>` : ''}
        </div>
      </div>`).join('')}</div>`;
  }

  // ─── Stepper de progression dans un défi ───────────────────────────
  function buildPhaseSteps(hasKB, totalQ, currentPhase, currentQIdx) {
    const steps = [];
    if (hasKB) steps.push({ id: 'knowledge', label: 'Notions' });
    for (let i = 1; i <= totalQ; i++) {
      steps.push({ id: `q${i}`, label: `Question ${i}` });
    }

    const currentId = currentPhase === 'knowledge' ? 'knowledge' : `q${currentQIdx}`;
    const currentStepIdx = steps.findIndex(s => s.id === currentId);

    return `<div class="phase-steps">${steps.map((s, i) => {
      const isDone = i < currentStepIdx;
      const isActive = i === currentStepIdx;
      return `
        <div class="phase-step ${isDone ? 'done' : isActive ? 'active' : ''}">
          ${i > 0 ? `<div class="phase-step-line"></div>` : ''}
          <div class="phase-step-wrap">
            <div class="phase-step-dot">${isDone ? '\u2713' : i + 1}</div>
            <div class="phase-step-label">${s.label}</div>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  // ─── Variable pour suivre la phase courante ────────────────────────
  let currentPhase = 'knowledge'; // 'knowledge' or 'questions'

  // ─── Trouver les données d'un défi par index séquentiel ──────────
  function getChallengeData(idx) {
    const ch = flatChallenges[idx - 1];
    if (!ch) return null;
    const num = extractNum(ch.rawId);
    if (num === null) return null;
    const key1 = `${gameId}_ch${num}`;
    const key2 = String(ch.rawId);
    const key3 = `ch${num}`;
    const raw = challengesData[key1] || challengesData[key2] || challengesData[key3] || null;
    if (!raw) return null;

    // If raw is already an array (old format), return as-is
    if (Array.isArray(raw)) return raw;

    // New format: { scenario, questions } → transform to expected array
    const scenario = raw.scenario || '';
    const rawQuestions = raw.questions || [];
    if (rawQuestions.length === 0) return null;

    return rawQuestions.map((rq, qi) => {
      const transformed = {
        type: rq.type || 'mcq',
        q: rq.question || '',
        explanation: rq.explanation || '',
        points: rq.points || 10
      };

      // Pass through metadata fields if present
      if (rq.ytUrl) transformed.ytUrl = rq.ytUrl;
      if (rq.placeholder) transformed.placeholder = rq.placeholder;
      if (rq.aiPrompt) transformed.aiPrompt = rq.aiPrompt;
      if (rq.toolUrl) transformed.toolUrl = rq.toolUrl;
      if (rq.toolInstruction) transformed.toolInstruction = rq.toolInstruction;

      // Attach scenario to first question
      if (qi === 0 && scenario) {
        transformed.sc = scenario;
      }

      const opts = rq.options || [];
      const qType = transformed.type;

      if (qType === 'mcq') {
        // MCQ: options → opts with {t, ok, fb}
        const correctIdx = typeof rq.correct_answer === 'number' ? rq.correct_answer : -1;
        transformed.opts = opts.map((o, oi) => ({
          t: o.text || '',
          ok: o.correct === true || oi === correctIdx,
          fb: o.feedback || ''
        }));
      } else if (qType === 'checkbox') {
        // Checkbox: options → opts with {t, ok, fb}
        transformed.opts = opts.map(o => ({
          t: o.text || '',
          ok: o.correct === true,
          fb: o.feedback || ''
        }));
      } else if (qType === 'ordering') {
        // Ordering: options have text and order (correct position)
        transformed.items = opts.map(o => o.text || '');
        // Build solution: the correct order based on 'order' field
        if (opts.length > 0 && opts[0].order !== undefined) {
          // Create array of indices sorted by their 'order' value
          const indexed = opts.map((o, i) => ({ idx: i, order: o.order }));
          indexed.sort((a, b) => a.order - b.order);
          transformed.solution = indexed.map(x => x.idx);
        } else {
          transformed.solution = opts.map((_, i) => i);
        }
      } else if (qType === 'matching') {
        // Matching: options come in pairs with term/definition or text fields
        const pairMap = {};
        opts.forEach(o => {
          const pairId = o.id || '';
          if (!pairMap[pairId]) pairMap[pairId] = { left: '', right: '' };
          if (o.term !== undefined) {
            pairMap[pairId].left = o.term;
          } else if (o.definition !== undefined) {
            pairMap[pairId].right = o.definition;
          } else if (o.text) {
            // Fallback: first text is left, second is right
            if (!pairMap[pairId].left) pairMap[pairId].left = o.text;
            else pairMap[pairId].right = o.text;
          }
        });
        transformed.pairs = Object.values(pairMap).map(p => ({
          left: p.left || '',
          right: p.right || ''
        }));
      } else if (qType === 'tuto') {
        // Tuto: may have opts for MCQ after video
        if (opts.length > 0) {
          transformed.opts = opts.map(o => ({
            t: o.text || '',
            ok: o.correct === true,
            fb: o.feedback || ''
          }));
        }
      } else if (qType === 'tool') {
        // Tool: free text response
        // toolUrl and toolInstruction may come from options or question text
      } else if (qType === 'screenshot') {
        // Screenshot: free text/upload response
      } else if (qType === 'free') {
        // Free text response
      }

      return transformed;
    });
  }

  // ─── Helpers pour les types de questions ──────────────────────────
  const TYPE_LABELS = {
    'mcq': 'QCM',
    'checkbox': 'Choix multiples',
    'ordering': 'Classement',
    'matching': 'Association',
    'free': 'Réponse libre',
    'tuto': 'Tutoriel vidéo',
    'tool': 'Manipulation outil',
    'screenshot': 'Capture d\'écran'
  };

  function getTypeLabel(q) {
    if (q.type && TYPE_LABELS[q.type]) return TYPE_LABELS[q.type];
    // Fallback pour MCQ sans type explicite
    const opts = q.opts || [];
    if (opts.length > 0) {
      return opts.filter(o => o.ok).length > 1 ? 'Choix multiples' : 'QCM';
    }
    return 'Question';
  }

  function getEffectiveType(q) {
    if (q.type) return q.type;
    // Inférer le type depuis la structure
    if (q.items && q.solution) return 'ordering';
    if (q.pairs) return 'matching';
    if (q.items && !q.solution) return 'checkbox';
    if (q.opts && q.opts.length > 0) {
      return q.opts.filter(o => o.ok).length > 1 ? 'checkbox' : 'mcq';
    }
    return 'free';
  }

  // ─── Icônes des communications ───────────────────────────────────
  const COMM_ICONS = {
    'email': '\u2709',
    'teams': '\uD83D\uDCAC',
    'visio': '\uD83C\uDFA5',
    'vocal': '\uD83C\uDF99',

  function renderComms(comms) {

  // ─── Formater le texte d'introduction ──────────────────────────
  function formatIntroText(raw) {
    if (!raw || raw.trim().length === 0) return '';
    
    // Split into paragraphs by double newlines
    const blocks = raw.split(/\n\n+/);
    let html = '';
    let inCharCard = false;
    let charHtml = '';
    let charMeta = [];
    let charSpeech = [];
    let charNarrative = [];
    
    // Regex patterns
    const charNameRe = /^([A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸÇŒÆ][A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸÇŒÆ\s'-]+)\s*[—–-]\s*(.+)$/;
    const sectionTitleRe = /^[A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸÇŒÆ][A-ZÀÂÄÉÈÊËÏÎÔÙÛÜŸÇŒÆ\s'']+$/;
    const metaRe = /^(Âge|Rôle|Personnalité|Compétences|Ce qu'(?:il|elle) (?:peut t'apporter|attend de toi)|Canal de communication préféré|Phrase typique|Ce qu'(?:il|elle) attend|Tempérament|Spécialité|Domaine|Expertise|Formation|Expérience|Fonction|Poste|Mission|Objectif|Responsabilité|Qualité|Défaut)\s*:\s*(.+)$/i;
    
    function flushCharCard() {
      if (!inCharCard) return;
      // Close any open character card
      if (charSpeech.length > 0) {
        charHtml += '<div class="ob-char-speech">' + charSpeech.join('<br><br>') + '</div>';
      }
      if (charNarrative.length > 0) {
        charHtml += charNarrative.map(n => '<p class="ob-narrative">' + n + '</p>').join('');
      }
      if (charMeta.length > 0) {
        charHtml += '<div class="ob-char-meta">';
        charMeta.forEach(m => {
          charHtml += '<div class="ob-char-meta-item"><span class="meta-label">' + esc(m.label) + '</span><span class="meta-value">' + esc(m.value) + '</span></div>';
        });
        charHtml += '</div>';
      }
      charHtml += '</div>'; // close ob-character-card
      html += charHtml;
      inCharCard = false;
      charHtml = '';
      charMeta = [];
      charSpeech = [];
      charNarrative = [];
    }
    
    function getInitials(name) {
      return name.split(/\s+/).map(w => w[0]).join('').substring(0, 2);
    }
    
    for (let i = 0; i < blocks.length; i++) {
      const block = blocks[i].trim();
      if (!block) continue;
      
      // Check if it's a character name line: "SOPHIE MARTIN — Fondatrice"
      const charMatch = block.match(charNameRe);
      if (charMatch) {
        flushCharCard();
        inCharCard = true;
        const name = charMatch[1].trim();
        const role = charMatch[2].trim();
        charHtml = '<div class="ob-character-card">';
        charHtml += '<div class="ob-char-header">';
        charHtml += '<div class="ob-char-avatar">' + esc(getInitials(name)) + '</div>';
        charHtml += '<div><div class="ob-char-name">' + esc(name) + '</div>';
        charHtml += '<div class="ob-char-role">' + esc(role) + '</div></div>';
        charHtml += '</div>';
        continue;
      }
      
      // Check if it's a section title (ALL CAPS, short)
      if (sectionTitleRe.test(block) && block.length < 60 && !inCharCard) {
        flushCharCard();
        html += '<div class="ob-section-title">' + esc(block) + '</div>';
        continue;
      }
      
      // Check if it's a metadata line (Âge : 31 ans, Rôle : ...)
      const metaMatch = block.match(metaRe);
      if (metaMatch && inCharCard) {
        charMeta.push({ label: metaMatch[1], value: metaMatch[2] });
        continue;
      }
      
      // If we're inside a character card
      if (inCharCard) {
        // Check if it starts/ends with quotes (speech)
        const trimmed = block.replace(/\n/g, ' ');
        if (trimmed.startsWith('"') || trimmed.startsWith('\u201C') || trimmed.startsWith('\u00AB') || trimmed.startsWith("'")) {
          charSpeech.push(esc(trimmed));
        } else if (charSpeech.length > 0 && (trimmed.endsWith('"') || trimmed.endsWith('\u201D') || trimmed.endsWith('\u00BB') || trimmed.endsWith("'"))) {
          // Continuation of speech
          charSpeech.push(esc(trimmed));
        } else if (charSpeech.length > 0 && charMeta.length === 0 && !metaRe.test(trimmed)) {
          // Still in speech context if no meta yet
          charSpeech.push(esc(trimmed));
        } else {
          charNarrative.push(esc(trimmed));
        }
        continue;
      }
      
      // Regular paragraph (narrative text)
      const text = block.replace(/\n/g, ' ');
      html += '<p class="ob-narrative">' + esc(text) + '</p>';
    }
    
    // Flush any remaining character card
    flushCharCard();
    
    return html;
  }

            <h1>Bienvenue chez <em>${esc(gameName)}</em></h1>

          </div>
          ${videoHtml}
          <div class="ob-content">${introHtml || '<p class="ob-narrative">Aucune information d\'intégration disponible.</p>'}</div>
          <div class="ob-actions">
            <button class="btn btn-primary btn-lg" onclick="goToChallenge(1)" style="background:${gameColor}">
              Commencer la simulation
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-left:8px"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>`;
      content.scrollTop = 0;
      initRichEditors();

      // Clear toolbox
      const tb = document.getElementById('toolbox-content');
      if (tb) tb.innerHTML = '<div style="padding:16px 0"><div style="background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:center"><div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--cobalt);font-weight:600;margin-bottom:6px">Conseil</div><div style="font-size:12.5px;color:var(--ink-soft);line-height:1.5">Lisez attentivement l\'intégration. Elle contient toutes les informations nécessaires pour réussir vos défis.</div></div></div>';

    const newUrl = `game.html?game=${gameId}&ch=${idx}`;
    history.replaceState(null, '', newUrl);

    const content = document.getElementById('game-content');

    if (!questions || questions.length === 0) {
      content.innerHTML = `
        <div class="no-data">

      return;
    }

    // Build challenge HTML
    const firstQ = questions[0];
    const challengeTitle = firstQ.t || (chInfo ? chInfo.title : 'Défi ' + idx);
    const challengeColor = firstQ.c || gameColor;
    const knowledgeNotions = getKnowledgeNotions(idx);
    const hasKB = knowledgeNotions.length > 0;

    // Determine initial phase
    currentPhase = hasKB ? 'knowledge' : 'questions';

    let html = '';

    // Hero
    html += `<div class="game-hero">

        <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 9 22 9 17 14 19 22 12 17 5 22 7 14 2 9 9 9 12 2"/></svg> Score max : ${questions.length * 20} pts</span>
        <span>${questions.length} question${questions.length > 1 ? 's' : ''}</span>
      </div>
    </div>`;

    // ─── STEPPER ──────────────────────────────────────────────────
    html += buildPhaseSteps(hasKB, questions.length, 'knowledge', 1);

    // ─── KNOWLEDGE BASE (Notions à connaître) ────────────────────
    if (hasKB) {
      const kbHtml = renderKnowledgeBase(knowledgeNotions);
      html += `<div id="knowledge-section">

          </div>
          <h2 style="font-size:18px;color:var(--ink-soft);font-weight:500;margin-bottom:20px">Lisez ces notions avant de répondre aux questions</h2>
          <div style="font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:var(--ink-mute);margin-bottom:16px">Notions à connaître</div>

    // Main document (from first question's doc — shared across all questions)
    if (firstQ.doc) {

    // Questions
    questions.forEach((q, qi) => {
      const qNum = qi + 1;

      html += `<div class="game-q" id="q-${qNum}">

      // ─── RENDER BY TYPE ─────────────────────────────────────────
      if (qType === 'ordering') {

      } else if (qType === 'matching') {
        html += renderMatching(q, qNum);
      } else if (qType === 'checkbox') {
        html += renderCheckbox(q, qNum);
      } else if (qType === 'tuto') {
        html += renderTuto(q, qNum);
      } else if (qType === 'tool') {
        html += renderTool(q, qNum);
      } else if (qType === 'screenshot') {
        html += renderScreenshot(q, qNum);
      } else if (qType === 'free') {
        html += renderRichEditor(qNum, q.placeholder || 'Rédigez votre réponse ici...');
      } else {
        // MCQ (default)
        html += renderMCQ(q, qNum);
      }

      // Feedback area
      html += `<div class="feedback" id="fb-${qNum}"></div>`;

      // Memo
      if (q.memo) {
        const memoContent = Array.isArray(q.memo)

  // ═══════════════════════════════════════════════════════════════════
  // RENDER FUNCTIONS FOR EACH QUESTION TYPE
  // ═══════════════════════════════════════════════════════════════════

  function renderMCQ(q, qNum) {
    const opts = q.opts || [];
    const isMultiple = opts.filter(o => o.ok).length > 1;
    let h = `<div class="choice-list" data-q="${qNum}" data-multiple="${isMultiple}" data-type="mcq">`;
    opts.forEach((opt, oi) => {
      const indicator = isMultiple ? 'ch-check' : 'ch-radio';
      h += `<div class="choice" data-q="${qNum}" data-opt="${oi}" data-ok="${opt.ok ? 1 : 0}" data-fb="${esc(opt.fb || '')}" onclick="selectOption(this)">
        <div class="${indicator}"></div>
        <div class="text">${formatOptionText(opt.t)}</div>
      </div>`;
    });
    h += '</div>';
    return h;
  }

  function renderCheckbox(q, qNum) {
    const items = q.items || q.opts || [];
    let h = `<div class="choice-list" data-q="${qNum}" data-multiple="true" data-type="checkbox">`;
    items.forEach((item, ii) => {
      const text = item.t || item;
      const ok = item.ok !== undefined ? item.ok : false;
      const fb = item.fb || '';
      h += `<div class="choice" data-q="${qNum}" data-opt="${ii}" data-ok="${ok ? 1 : 0}" data-fb="${esc(fb)}" onclick="selectOption(this)">
        <div class="ch-check"></div>
        <div class="text">${esc(text)}</div>
      </div>`;
    });
    h += '</div>';
    return h;
  }

  function renderOrdering(q, qNum) {
    const items = q.items || [];
    let h = `<div class="ordering-list" data-q="${qNum}" data-type="ordering">`;
    items.forEach((item, ii) => {
      h += `<div class="ordering-item" data-q="${qNum}" data-idx="${ii}" draggable="true">
        <div class="ord-num">${ii + 1}</div>
        <div class="ord-text">${esc(item)}</div>
        <div class="ordering-btns">
          <button onclick="moveOrderItem(this,-1)" title="Monter" type="button">\u25B2</button>
          <button onclick="moveOrderItem(this,1)" title="Descendre" type="button">\u25BC</button>
        </div>
        <div class="ord-handle"><span></span><span></span><span></span></div>
      </div>`;
    });
    h += '</div>';
    return h;
  }

  function renderMatching(q, qNum) {
    const pairs = q.pairs || [];
    // Shuffle right column
    const rights = pairs.map(p => p.right);
    const shuffledRights = [...rights].sort(() => Math.random() - 0.5);

    let h = `<div class="matching-zone" data-q="${qNum}" data-type="matching" data-total="${pairs.length}">
      <div class="matching-col" data-side="left">
        <h6>Concepts</h6>`;
    pairs.forEach((p, pi) => {
      h += `<div class="matching-item" data-q="${qNum}" data-side="left" data-idx="${pi}" data-value="${esc(p.left)}" onclick="selectMatchItem(this)">${esc(p.left)}</div>`;
    });
    h += '</div><div class="matching-col" data-side="right"><h6>Définitions</h6>';
    shuffledRights.forEach((r, ri) => {
      h += `<div class="matching-item" data-q="${qNum}" data-side="right" data-idx="${ri}" data-value="${esc(r)}" onclick="selectMatchItem(this)">${esc(r)}</div>`;
    });
    h += '</div></div>';
    h += `<div class="matching-pairs-display" data-q="${qNum}" id="match-pairs-${qNum}"></div>`;
    return h;
  }

    if (q.ytUrl) {

  // ─── YouTube ID extraction ──────────────────────────────────────
  function extractYouTubeId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  // ─── Toolbox ─────────────────────────────────────────────────────

  // ═══════════════════════════════════════════════════════════════════
  // INTERACTIONS
  // ═══════════════════════════════════════════════════════════════════

  // ─── Sélection d'une option (MCQ / Checkbox) ────────────────────
  window.selectOption = function(el) {
    const list = el.closest('.choice-list');
    const isMultiple = list.dataset.multiple === 'true';

    if (isMultiple) {
      el.classList.toggle('selected');
    } else {
      list.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }
  };

  // ─── Ordering: move items up/down ───────────────────────────────
  window.moveOrderItem = function(btn, direction) {
    const item = btn.closest('.ordering-item');
    const list = item.closest('.ordering-list');
    const items = Array.from(list.children);
    const idx = items.indexOf(item);

    if (direction === -1 && idx > 0) {
      list.insertBefore(item, items[idx - 1]);
    } else if (direction === 1 && idx < items.length - 1) {
      list.insertBefore(items[idx + 1], item);
    }

    // Update numbers
    Array.from(list.children).forEach((el, i) => {
      el.querySelector('.ord-num').textContent = i + 1;
    });
  };

  // ─── Ordering: drag & drop ──────────────────────────────────────
  function initOrderingDragDrop() {
    document.querySelectorAll('.ordering-list').forEach(list => {
      let dragItem = null;

      list.addEventListener('dragstart', e => {
        dragItem = e.target.closest('.ordering-item');
        if (dragItem) {
          dragItem.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        }
      });

      list.addEventListener('dragend', e => {
        if (dragItem) {
          dragItem.classList.remove('dragging');
          dragItem = null;
          // Update numbers
          Array.from(list.children).forEach((el, i) => {
            el.querySelector('.ord-num').textContent = i + 1;
          });
        }
      });

      list.addEventListener('dragover', e => {
        e.preventDefault();
        const afterElement = getDragAfterElement(list, e.clientY);
        if (dragItem) {
          if (afterElement == null) {
            list.appendChild(dragItem);
          } else {
            list.insertBefore(dragItem, afterElement);
          }
        }
      });
    });
  }

  function getDragAfterElement(container, y) {
    const elements = [...container.querySelectorAll('.ordering-item:not(.dragging)')];
    return elements.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset: offset, element: child };
      }
      return closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  // ─── Matching: select and pair items ────────────────────────────
  let matchState = {}; // { qNum: { selectedLeft: null, selectedRight: null, pairs: [] } }

  function initMatchingInteractions() {
    matchState = {};
    document.querySelectorAll('.matching-zone').forEach(zone => {
      const qNum = zone.dataset.q;
      matchState[qNum] = { selectedLeft: null, selectedRight: null, pairs: [] };
    });
  }

  window.selectMatchItem = function(el) {
    const qNum = el.dataset.q;
    const side = el.dataset.side;
    const value = el.dataset.value;

    if (el.classList.contains('matched')) return;

    const state = matchState[qNum];
    if (!state) return;

    // Deselect previous on same side
    const zone = el.closest('.matching-zone');
    zone.querySelectorAll(`.matching-item[data-side="${side}"]`).forEach(item => {
      if (!item.classList.contains('matched')) item.classList.remove('selected');
    });

    el.classList.add('selected');

    if (side === 'left') {
      state.selectedLeft = { el, value };
    } else {
      state.selectedRight = { el, value };
    }

    // If both sides selected, create a pair
    if (state.selectedLeft && state.selectedRight) {
      state.pairs.push({
        left: state.selectedLeft.value,
        right: state.selectedRight.value,
        leftEl: state.selectedLeft.el,
        rightEl: state.selectedRight.el
      });

      state.selectedLeft.el.classList.remove('selected');
      state.selectedLeft.el.classList.add('matched');
      state.selectedRight.el.classList.remove('selected');
      state.selectedRight.el.classList.add('matched');

      // Show pair in display area
      const display = document.getElementById(`match-pairs-${qNum}`);
      if (display) {
        const pairHtml = `<div class="matching-pair-row">
          <span class="mp-left">${esc(state.pairs[state.pairs.length - 1].left)}</span>
          <span class="mp-arrow">\u2194</span>
          <span class="mp-right">${esc(state.pairs[state.pairs.length - 1].right)}</span>
        </div>`;
        display.insertAdjacentHTML('beforeend', pairHtml);
      }

      state.selectedLeft = null;
      state.selectedRight = null;
    }
  };

  // ═══════════════════════════════════════════════════════════════════
  // CORRECTION IA
  // ═══════════════════════════════════════════════════════════════════

  async function correctFreeResponseWithAI(q, qNum, answer, challengeContext) {
    const apiKey = localStorage.getItem('imm_claude_api_key');
    const fbEl = document.getElementById(`fb-${qNum}`);

    if (!apiKey || !answer.trim()) {
      if (fbEl) {
        if (!answer.trim()) {
          fbEl.innerHTML = 'Aucune réponse saisie. Essayez de rédiger votre réponse avant de valider.';
          fbEl.className = 'feedback show incorrect';
        } else {
          fbEl.innerHTML = 'Réponse enregistrée. <span class="ai-badge" style="background:var(--bg-alt);color:var(--ink-mute)">SANS IA</span> Consultez les points « À retenir » pour vérifier votre compréhension.';
          fbEl.className = 'feedback show correct';
        }
      }
      return { score: answer.trim() ? 5 : 0, total: 10, hasAI: false };
    }

    if (fbEl) {
      fbEl.innerHTML = '<div class="ai-loading"><div class="ai-spinner"></div> Correction par Claude IA en cours...</div>';
      fbEl.className = 'feedback show';
      fbEl.style.display = 'block';
    }

    try {
      const aiContext = q.aiPrompt ? (challengeContext + '\n\nCritères d\'évaluation : ' + q.aiPrompt) : challengeContext;
      const resp = await fetch('/functions/ai-correct', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'correct',
          api_key: apiKey,
          question: q.q,
          answer: answer,
          context: aiContext,
          memo: q.memo || null,
          game_title: gameFullTitle
        })
      });

      const data = await resp.json();

      if (data.success && data.correction) {
        const c = data.correction;
        const scoreClass = c.score >= 7 ? 'good' : c.score >= 4 ? 'average' : 'poor';
        const scoreColor = c.score >= 7 ? '#0D9488' : c.score >= 4 ? '#D97706' : '#DC2626';

        let html = `<div class="ai-feedback ${scoreClass}">`;
        html += `<div class="ai-score" style="color:${scoreColor}">${c.score}<span class="out-of">/10</span> <span class="ai-badge ia">CLAUDE IA</span></div>`;
        html += `<div>${c.feedback || ''}</div>`;

        if (c.points_forts && c.points_forts.length > 0) {
          html += '<div class="ai-detail"><h6 style="color:#0D9488">Points forts</h6><ul>';
          c.points_forts.forEach(p => { html += `<li>${esc(p)}</li>`; });
          html += '</ul></div>';
        }
        if (c.ameliorations && c.ameliorations.length > 0) {
          html += '<div class="ai-detail"><h6 style="color:#D97706">Axes d\'amélioration</h6><ul>';
          c.ameliorations.forEach(a => { html += `<li>${esc(a)}</li>`; });
          html += '</ul></div>';
        }
        html += '</div>';

        if (fbEl) {
          fbEl.innerHTML = html;
          fbEl.className = 'feedback show';
        }

        return { score: c.score, total: 10, hasAI: true };
      } else {
        if (fbEl) {
          fbEl.innerHTML = `Réponse enregistrée. <span class="ai-badge" style="background:rgba(220,38,38,.1);color:#DC2626">ERREUR IA</span> ${esc(data.error || 'Erreur de correction.')} Consultez les points « À retenir ».`;
          fbEl.className = 'feedback show correct';
        }
        return { score: 5, total: 10, hasAI: false };
      }
    } catch (err) {
      if (fbEl) {
        fbEl.innerHTML = 'Réponse enregistrée. <span class="ai-badge" style="background:var(--bg-alt);color:var(--ink-mute)">HORS LIGNE</span> La correction IA n\'est pas disponible. Consultez les points « À retenir ».';
        fbEl.className = 'feedback show correct';
      }
      return { score: 5, total: 10, hasAI: false };
    }
  }

  // ═══════════════════════════════════════════════════════════════════
  // VALIDATION
  // ═══════════════════════════════════════════════════════════════════

  window.validateChallenge = async function(idx) {
    const questions = getChallengeData(idx);
    if (!questions) return;

    const validateBtn = document.querySelector('.game-actions .btn-primary');
    if (validateBtn) {
      validateBtn.disabled = true;
      validateBtn.innerHTML = '<div class="ai-spinner" style="width:14px;height:14px;border-width:2px"></div> Correction en cours...';
    }

    let score = 0;
    let total = 0;
    let aiTotal = 0;
    let aiScore = 0;
    const firstQ = questions[0];
    const challengeContext = firstQ ? (firstQ.sc || firstQ.doc || '') : '';

    const aiPromises = [];

    questions.forEach((q, qi) => {
      const qNum = qi + 1;
      const qType = getEffectiveType(q);

      // ─── FREE / TOOL / SCREENSHOT → IA ─────────────────────────
      if (qType === 'free' || qType === 'tool' || qType === 'screenshot') {
        const answer = getEditorText(qNum);
        disableEditor(qNum);

        aiPromises.push(
          correctFreeResponseWithAI(q, qNum, answer + (getEditorAttachments(qNum).length ? '\n\n[Documents joints: ' + getEditorAttachments(qNum).map(a=>a.name).join(', ') + ']' : ''), challengeContext)
            .then(result => {
              aiTotal += result.total;
              aiScore += result.score;
            })
        );
        return;
      }

      // ─── TUTO (with MCQ or free) ───────────────────────────────
      if (qType === 'tuto') {
        if (q.opts && q.opts.length > 0) {
          // Tuto with MCQ verification
          total++;
          const list = document.querySelector(`.choice-list[data-q="${qNum}"]`);
          if (list) {
            const questionCorrect = validateMCQList(list, qNum);
            if (questionCorrect) score++;
          }
        } else {
          // Tuto with free response
          const answer = getEditorText(qNum);
          disableEditor(qNum);
          aiPromises.push(
            correctFreeResponseWithAI(q, qNum, answer + (getEditorAttachments(qNum).length ? '\n\n[Documents joints: ' + getEditorAttachments(qNum).map(a=>a.name).join(', ') + ']' : ''), challengeContext)
              .then(result => {
                aiTotal += result.total;
                aiScore += result.score;
              })
          );
        }
        return;
      }

      // ─── ORDERING ──────────────────────────────────────────────
      if (qType === 'ordering') {
        total++;
        const list = document.querySelector(`.ordering-list[data-q="${qNum}"]`);
        if (list) {
          const solution = q.solution || [];
          const currentOrder = Array.from(list.children).map(el => el.querySelector('.ord-text').textContent);
          let allCorrect = true;

          Array.from(list.children).forEach((el, i) => {
            const text = el.querySelector('.ord-text').textContent;
            if (i < solution.length && text === solution[i]) {
              el.classList.add('correct-pos');
            } else {
              el.classList.add('incorrect-pos');
              allCorrect = false;
            }
            el.draggable = false;
            el.querySelectorAll('.ordering-btns button').forEach(b => b.disabled = true);
          });

          if (allCorrect) score++;

          // Show feedback
          const fbEl = document.getElementById(`fb-${qNum}`);
          if (fbEl) {
            if (allCorrect) {
              fbEl.innerHTML = q.feedbackCorrect || 'Parfait ! L\'ordre est correct.';
              fbEl.className = 'feedback show correct';
            } else {
              let correctOrderHtml = '<div style="margin-top:8px"><strong>Ordre correct :</strong><ol style="margin:6px 0 0 20px">';
              solution.forEach(s => { correctOrderHtml += `<li>${esc(s)}</li>`; });
              correctOrderHtml += '</ol></div>';
              fbEl.innerHTML = (q.feedbackIncorrect || 'L\'ordre n\'est pas correct.') + correctOrderHtml;
              fbEl.className = 'feedback show incorrect';
            }
          }
        }
        return;
      }

      // ─── MATCHING ──────────────────────────────────────────────
      if (qType === 'matching') {
        total++;
        const correctPairs = q.pairs || [];
        const state = matchState[qNum];
        const userPairs = state ? state.pairs : [];

        let matchCorrect = 0;
        const pairDisplay = document.getElementById(`match-pairs-${qNum}`);

        // Check each user pair
        if (pairDisplay) {
          pairDisplay.innerHTML = '';
          userPairs.forEach(up => {
            const isCorrect = correctPairs.some(cp => cp.left === up.left && cp.right === up.right);
            if (isCorrect) matchCorrect++;
            pairDisplay.innerHTML += `<div class="matching-pair-row ${isCorrect ? 'mp-correct' : 'mp-incorrect'}">
              <span class="mp-left">${esc(up.left)}</span>
              <span class="mp-arrow">${isCorrect ? '\u2713' : '\u2717'}</span>
              <span class="mp-right">${esc(up.right)}</span>
            </div>`;
          });

          // Show missing pairs
          correctPairs.forEach(cp => {
            const found = userPairs.some(up => up.left === cp.left && up.right === cp.right);
            if (!found) {
              pairDisplay.innerHTML += `<div class="matching-pair-row mp-incorrect" style="opacity:.6">
                <span class="mp-left">${esc(cp.left)}</span>
                <span class="mp-arrow">\u2192</span>
                <span class="mp-right">${esc(cp.right)}</span>
                <span style="font-size:10px;color:var(--ink-mute);margin-left:8px">(non associé)</span>
              </div>`;
            }
          });
        }

        // Disable all matching items
        document.querySelectorAll(`.matching-item[data-q="${qNum}"]`).forEach(el => {
          el.style.pointerEvents = 'none';
        });

        if (matchCorrect === correctPairs.length && userPairs.length === correctPairs.length) score++;

        const fbEl = document.getElementById(`fb-${qNum}`);
        if (fbEl) {
          if (matchCorrect === correctPairs.length && userPairs.length === correctPairs.length) {
            fbEl.innerHTML = q.feedbackCorrect || 'Toutes les associations sont correctes !';
            fbEl.className = 'feedback show correct';
          } else {
            fbEl.innerHTML = (q.feedbackIncorrect || `${matchCorrect}/${correctPairs.length} associations correctes. Consultez les corrections ci-dessus.`);
            fbEl.className = 'feedback show incorrect';
          }
        }
        return;
      }

      // ─── MCQ / CHECKBOX (default) ─────────────────────────────
      total++;
      const list = document.querySelector(`.choice-list[data-q="${qNum}"]`);
      if (!list) return;
      const questionCorrect = validateMCQList(list, qNum);
      if (questionCorrect) score++;
    });

    // Wait for all AI corrections
    await Promise.all(aiPromises);

    // Calculate combined score
    const qcmPct = total > 0 ? (score / total) * 100 : 0;
    const aiPct = aiTotal > 0 ? (aiScore / aiTotal) * 100 : 0;
    const hasFree = aiTotal > 0;
    const hasQcm = total > 0;

    let finalPct, finalLabel;
    if (hasQcm && hasFree) {
      finalPct = Math.round((qcmPct + aiPct) / 2);
      finalLabel = `Exercices : ${score}/${total} — Réponses libres (IA) : ${aiScore}/${aiTotal}`;
    } else if (hasFree) {
      finalPct = Math.round(aiPct);
      finalLabel = `Score IA : ${aiScore}/${aiTotal}`;
    } else {
      finalPct = total > 0 ? Math.round((score / total) * 100) : 100;
      finalLabel = `${score}/${total} réponses correctes`;
    }

    const scoreColor = finalPct >= 70 ? '#2E7D32' : finalPct >= 40 ? '#D97706' : '#DC2626';

    const content = document.getElementById('game-content');
    const scoreHtml = `<div style="margin-top:24px;padding:24px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);text-align:center">
      <div style="font-family:var(--f-display);font-size:42px;font-weight:500;color:${scoreColor}">${finalPct}%</div>
      <div style="font-size:14px;color:var(--ink-soft);margin-top:8px">${finalLabel}</div>
      <div style="font-size:12px;color:var(--ink-mute);margin-top:4px">${finalPct >= 70 ? 'Excellent travail !' : finalPct >= 40 ? 'Consultez les corrections ci-dessus pour progresser.' : 'Relisez attentivement le contexte et réessayez.'}</div>
      ${idx < totalChallenges ? `<button class="btn btn-primary btn-lg" style="margin-top:16px" onclick="goToChallenge(${idx + 1})">Passer au défi suivant \u2192</button>` : `<a href="catalogue.html" class="btn btn-primary btn-lg" style="margin-top:16px">Retour au catalogue</a>`}
    </div>`;

    const actions = content.querySelector('.game-actions');
    if (actions) {
      actions.insertAdjacentHTML('afterend', scoreHtml);
      actions.remove();
    }
  };

  // ─── Helper: validate MCQ/Checkbox list ─────────────────────────
  function validateMCQList(list, qNum) {
    const choices = list.querySelectorAll('.choice');
    let questionCorrect = true;

    choices.forEach(c => {
      const isOk = c.dataset.ok === '1';
      const isSelected = c.classList.contains('selected');
      const fb = c.dataset.fb;

      if (isSelected && isOk) {
        c.classList.add('correct');
        c.classList.remove('incorrect');
      } else if (isSelected && !isOk) {
        c.classList.add('incorrect');
        c.classList.remove('correct');
        questionCorrect = false;
      } else if (!isSelected && isOk) {
        c.classList.add('correct');
        questionCorrect = false;
      }

      if (isSelected && fb) {
        const fbEl = document.getElementById(`fb-${qNum}`);
        if (fbEl) {
          fbEl.textContent = fb;
          fbEl.className = `feedback show ${isOk ? 'correct' : 'incorrect'}`;
        }
      }

      c.style.pointerEvents = 'none';
    });

    return questionCorrect;
  }

  // ═══════════════════════════════════════════════════════════════════
  // NAVIGATION & PAYWALL
  // ═══════════════════════════════════════════════════════════════════

  function hasAccess() {
    var purchases = JSON.parse(localStorage.getItem('imm_purchases') || '{}');
    if (purchases[gameId] || purchases['pass_all']) return true;

    try {
      // Check all possible session sources
      var sess = JSON.parse(localStorage.getItem('imm_session') || '{}');
      if (sess.role === 'admin' || sess.role === 'formateur') return true;

      // Check sessionStorage admin session (set by admin login)
      var adminSess = JSON.parse(sessionStorage.getItem('imm-admin') || '{}');
      if (adminSess.role === 'admin') return true;

      // Check localStorage user session (set by user login)
      var userSess = JSON.parse(localStorage.getItem('imm-user') || '{}');
      if (userSess.role === 'admin' || userSess.role === 'formateur') return true;

      var freeEmails = JSON.parse(localStorage.getItem('imm_free_emails') || '{}');
      var userEmail = (sess.email || userSess.email || '').toLowerCase();
      if (userEmail && freeEmails[userEmail]) {
        var acc = freeEmails[userEmail];
        if (acc.expire) {
          var now = new Date().toISOString().split('T')[0];
          if (acc.expire < now) return false;
        }
        if (acc.type === 'pass') return true;
        if (acc.sims && acc.sims.indexOf(gameId) !== -1) return true;
      }

      var userName = (sess.name || userSess.name || userSess.display_name || adminSess.name || '').toLowerCase();
      var freeAccessList = JSON.parse(localStorage.getItem('imm_free_access') || '[]');
      for (var i = 0; i < freeAccessList.length; i++) {
        var fa = freeAccessList[i];
        if (!fa.active) continue;
        if (fa.expire) {
          var now2 = new Date().toISOString().split('T')[0];
          if (fa.expire < now2) continue;
        }
        var matchEmail = userEmail && fa.email && fa.email.toLowerCase() === userEmail;
        var matchName = userName && fa.name && fa.name.toLowerCase() === userName;
        if (matchEmail || matchName) {
          if (fa.type === 'pass') return true;
          if (fa.sims && fa.sims.indexOf(gameId) !== -1) return true;
        }
      }
    } catch(e) {}
    return false;
  }

              <div class="pw-plan-name">Illimit\u00e9</div>

        <div class="pw-free">
          ${localStorage.getItem('imm-token') ? '' : '<div style="margin-bottom:8px">Pas encore de compte ? <a href="login.html?mode=signup&redirect=game.html%3Fgame%3D' + gameId + '%26ch%3D' + idx + '" style="color:var(--jade);font-weight:600">Inscrivez-vous gratuitement</a></div>'}
          Vous avez d\u00e9j\u00e0 un acc\u00e8s ? <a href="login.html?next=game.html%3Fgame%3D${gameId}%26ch%3D${idx}">Connectez-vous</a>
        </div>
      </div>`;
    document.body.appendChild(overlay);
  }

  window.goToChallenge = function(idx) {
    if (idx < 0 || idx > totalChallenges) return;
    if (idx > 1 && !hasAccess()) {
      showPaywall(idx);
      return;
    }
    renderChallenge(idx);
  };

  window.toggleGameMenu = function() {
    const side = document.getElementById('game-side-left');
    if (!side) return;
    side.classList.toggle('mobile-open');
    document.body.style.overflow = side.classList.contains('mobile-open') ? 'hidden' : '';
  };

  // --- Rich Editor ------------------------------------------------
  function renderRichEditor(qNum, placeholder, aiType) {
    const ph = esc(placeholder || 'Redigez votre reponse ici...');
    const aiAttr = aiType ? ` data-ai-type="${aiType}"` : '';
    return `<div class="rich-editor-wrap" data-q="${qNum}"${aiAttr}>
      <div class="re-toolbar">
        <button type="button" data-cmd="bold" title="Gras (Ctrl+B)"><b>G</b></button>
        <button type="button" data-cmd="italic" title="Italique (Ctrl+I)"><i>I</i></button>
        <button type="button" data-cmd="underline" title="Souligne (Ctrl+U)"><u>S</u></button>
        <span class="re-sep"></span>
        <button type="button" data-cmd="justifyLeft" title="Aligner a gauche">&#8676;</button>
        <button type="button" data-cmd="justifyCenter" title="Centrer">&#8596;</button>
        <button type="button" data-cmd="justifyRight" title="Aligner a droite">&#8677;</button>
        <button type="button" data-cmd="justifyFull" title="Justifier">&#9776;</button>
        <span class="re-sep"></span>
        <button type="button" data-cmd="insertUnorderedList" title="Liste a puces">&#8226;</button>
        <button type="button" data-cmd="insertOrderedList" title="Liste numerotee">1.</button>
        <span class="re-sep"></span>
        <button type="button" class="re-upload-btn" data-action="upload" title="Joindre un document">&#128206; Joindre</button>
      </div>
      <div class="re-body" contenteditable="true" data-placeholder="${ph}" data-q="${qNum}"></div>
      <div class="re-attachments" data-q="${qNum}"></div>
      <input type="file" class="re-file-input" data-q="${qNum}" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.png,.jpg,.jpeg,.gif,.webp" multiple>
    </div>`;
  }

  function initRichEditors() {
    document.querySelectorAll('.re-toolbar button[data-cmd]').forEach(btn => {
      btn.addEventListener('mousedown', e => {
        e.preventDefault();
        document.execCommand(btn.dataset.cmd, false, null);
        updateToolbarState(btn.closest('.re-toolbar'));
      });
    });
    document.querySelectorAll('.re-toolbar button[data-action="upload"]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const wrap = btn.closest('.rich-editor-wrap');
        const fileInput = wrap.querySelector('.re-file-input');
        if (fileInput) fileInput.click();
      });
    });
    document.querySelectorAll('.re-file-input').forEach(input => {
      input.addEventListener('change', () => {
        const wrap = input.closest('.rich-editor-wrap');
        const attachments = wrap.querySelector('.re-attachments');
        Array.from(input.files).forEach(file => {
          const chip = document.createElement('span');
          chip.className = 're-file-chip';
          const ext = file.name.split('.').pop().toLowerCase();
          chip.innerHTML = `<span class="re-file-icon">${getFileIcon(ext)}</span><span class="re-file-name" title="${esc(file.name)}">${esc(file.name)}</span><span class="re-file-remove" title="Retirer">&times;</span>`;
          chip.dataset.fileName = file.name;
          chip.dataset.fileSize = file.size;
          chip._file = file;
          chip.querySelector('.re-file-remove').addEventListener('click', () => chip.remove());
          attachments.appendChild(chip);
        });
        input.value = '';
      });
    });
    document.querySelectorAll('.re-body').forEach(body => {
      body.addEventListener('keydown', e => {
        if (e.ctrlKey || e.metaKey) {
          if (e.key === 'b') { e.preventDefault(); document.execCommand('bold'); }
          if (e.key === 'i') { e.preventDefault(); document.execCommand('italic'); }
          if (e.key === 'u') { e.preventDefault(); document.execCommand('underline'); }
        }
      });
      body.addEventListener('mouseup', () => updateToolbarState(body.closest('.rich-editor-wrap').querySelector('.re-toolbar')));
      body.addEventListener('keyup', () => updateToolbarState(body.closest('.rich-editor-wrap').querySelector('.re-toolbar')));
    });
  }

  function updateToolbarState(toolbar) {
    if (!toolbar) return;
    toolbar.querySelectorAll('button[data-cmd]').forEach(btn => {
      try { btn.classList.toggle('active', document.queryCommandState(btn.dataset.cmd)); } catch(e) {}
    });
  }

  function getFileIcon(ext) {
    const m = {pdf:'&#128196;',doc:'&#128195;',docx:'&#128195;',xls:'&#128202;',xlsx:'&#128202;',ppt:'&#128202;',pptx:'&#128202;',txt:'&#128196;',csv:'&#128202;',png:'&#128444;',jpg:'&#128444;',jpeg:'&#128444;',gif:'&#128444;',webp:'&#128444;'};
    return m[ext] || '&#128206;';
  }

  function getEditorText(qNum) {
    const body = document.querySelector(`.re-body[data-q="${qNum}"]`);
    if (body) return body.innerText.trim();
    const ta = document.querySelector(`.free-textarea[data-q="${qNum}"]`);
    return ta ? ta.value.trim() : '';
  }

  function getEditorHtml(qNum) {
    const body = document.querySelector(`.re-body[data-q="${qNum}"]`);
    if (body) return body.innerHTML.trim();
    const ta = document.querySelector(`.free-textarea[data-q="${qNum}"]`);
    return ta ? ta.value.trim() : '';
  }

  function getEditorAttachments(qNum) {
    const wrap = document.querySelector(`.rich-editor-wrap[data-q="${qNum}"]`);
    if (!wrap) return [];
    return Array.from(wrap.querySelectorAll('.re-file-chip')).map(c => ({
      name: c.dataset.fileName,
      size: parseInt(c.dataset.fileSize || 0),
      file: c._file || null
    }));
  }

  function disableEditor(qNum) {
    const wrap = document.querySelector(`.rich-editor-wrap[data-q="${qNum}"]`);
    if (wrap) {
      wrap.classList.add('disabled');
      const body = wrap.querySelector('.re-body');
      if (body) body.contentEditable = 'false';
    }
    const ta = document.querySelector(`.free-textarea[data-q="${qNum}"]`);
    if (ta) ta.disabled = true;
  }


  // ─── Helpers ─────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function formatTitle(t) {
    return esc(t).replace(/_([^_]+)_/g, '<em>$1</em>');
  }

  function formatOptionText(t) {
    const m = t.match(/^([^.]+\.)\s*(.*)/s);
    if (m && m[1].length < 80) return `<strong>${esc(m[1])}</strong> ${esc(m[2])}`;
    return esc(t);
  }

    // ─── Démarrage ─────────────────────────────────────────────────
  if (currentIdx > 1 && !hasAccess()) {
    renderChallenge(0);
    showPaywall(currentIdx);
  } else if (currentIdx === 0 || (isNaN(parseInt(params.get('ch'))) && (game.intro_text || '').length > 0)) {
    // Show onboarding by default if no ch param and intro_text exists
    renderChallenge(0);
  } else {
    renderChallenge(currentIdx);
  }

})();
</script>
