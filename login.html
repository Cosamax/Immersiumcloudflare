<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connexion — Immersium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<style>
body { background: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
body::before { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.055  0 0 0 0 0.102  0 0 0 0 0.169  0 0 0 0.05 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

.auth-bg { position: fixed; inset: 0; pointer-events: none; }
.auth-orb { position: absolute; border-radius: 50%; }
.auth-orb-1 { top: -120px; right: -120px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,107,53,.15) 0%, transparent 60%); }
.auth-orb-2 { bottom: -80px; left: -80px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,0,128,.25) 0%, transparent 60%); }

.auth-card { width: 100%; max-width: 440px; position: relative; z-index: 1; }
.auth-brand { text-align: center; margin-bottom: 32px; }
.auth-brand a { display: inline-flex; align-items: baseline; gap: 10px; }
.auth-brand .name { font-family: var(--f-display); font-size: 28px; font-weight: 500; color: #fff; letter-spacing: -.02em; }
.auth-brand .name em { font-style: italic; color: var(--orange); }

.auth-box { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-xl); padding: 36px; }
.auth-tabs { display: flex; gap: 0; background: var(--bg-alt); border-radius: var(--r); padding: 4px; margin-bottom: 28px; }
.auth-tab { flex: 1; padding: 9px; text-align: center; border-radius: 8px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .15s; color: var(--ink-soft); }
.auth-tab.active { background: var(--paper); color: var(--ink); box-shadow: 0 1px 4px rgba(14,26,43,.1); }

.auth-form { display: flex; flex-direction: column; gap: 16px; }
.auth-divider { display: flex; align-items: center; gap: 12px; margin: 4px 0; }
.auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.auth-divider span { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .1em; }

.auth-submit { width: 100%; justify-content: center; padding: 14px; font-size: 14px; }
.auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--ink-mute); }
.auth-footer a { color: var(--marine); font-weight: 600; }

.reset-link { font-size: 12px; color: var(--ink-mute); text-align: right; display: block; margin-top: -8px; }
.reset-link:hover { color: var(--marine); }

.auth-error { background: var(--coral-soft); color: var(--coral); border: 1px solid rgba(211,47,47,.2); padding: 12px 16px; border-radius: var(--r); font-size: 13px; display: none; }
.auth-success { background: #F0FDF4; color: #166534; border: 1px solid rgba(22,163,74,.2); padding: 12px 16px; border-radius: var(--r); font-size: 13px; display: none; }

.strength-bar { height: 4px; border-radius: 999px; background: var(--line); margin-top: 6px; overflow: hidden; }
.strength-fill { height: 100%; border-radius: 999px; width: 0; transition: width .3s, background .3s; }
</style>
</head>
<body>

<div class="auth-bg">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
</div>

<div class="auth-card">
  <div class="auth-brand">
    <a href="index.html"><span class="name">Immer<em>sium</em></span></a>
    <div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.15em;text-transform:uppercase">Learn by doing · Caraïbes</div>
  </div>

  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Créer un compte</button>
      <button class="auth-tab" id="tab-admin" onclick="switchTab('admin')">Admin</button>
    </div>

    <div id="auth-error" class="auth-error"></div>
    <div id="auth-success" class="auth-success"></div>

    <!-- LOGIN FORM -->
    <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
      <div class="fld">
        <label>Email</label>
        <input type="email" id="login-email" required placeholder="marie@exemple.com" autocomplete="email">
      </div>
      <div class="fld">
        <label>Mot de passe</label>
        <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <a href="#" class="reset-link" onclick="switchTab('reset'); return false;">Mot de passe oublié ?</a>
      <button type="submit" class="btn btn-jade btn-lg auth-submit" id="login-btn">Se connecter</button>
    </form>

    <!-- SIGNUP FORM -->
    <form class="auth-form" id="form-signup" style="display:none" onsubmit="handleSignup(event)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="fld"><label>Prénom</label><input type="text" id="signup-firstname" required placeholder="Marie"></div>
        <div class="fld"><label>Nom</label><input type="text" id="signup-lastname" required placeholder="Dupont"></div>
      </div>
      <div class="fld">
        <label>Email</label>
        <input type="email" id="signup-email" required placeholder="marie@exemple.com" autocomplete="email">
      </div>
      <div class="fld">
        <label>Mot de passe</label>
        <input type="password" id="signup-password" required placeholder="8 caractères minimum" autocomplete="new-password" oninput="checkStrength(this.value)">
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>
      <button type="submit" class="btn btn-jade btn-lg auth-submit" id="signup-btn">Créer mon compte gratuitement</button>
      <p style="font-size:12px;color:var(--ink-mute);text-align:center">En créant un compte, vous acceptez nos <a href="cgu.html" style="color:var(--marine)">CGU</a> et notre <a href="mentions.html" style="color:var(--marine)">politique de confidentialité</a>.</p>
    </form>

    <!-- ADMIN FORM -->
    <form class="auth-form" id="form-admin" style="display:none" onsubmit="handleAdminLogin(event)">
      <div style="text-align:center;margin-bottom:4px">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background:var(--bg-alt);border-radius:12px;margin-bottom:8px">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path stroke="var(--ink-soft)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <p style="font-size:13px;color:var(--ink-mute);margin:0">Accès réservé aux administrateurs</p>
      </div>
      <div class="fld">
        <label>Nom d'utilisateur</label>
        <input type="text" id="admin-username" required placeholder="admin" autocomplete="off">
      </div>
      <div class="fld">
        <label>Code d'accès</label>
        <input type="password" id="admin-pin" required placeholder="••••" autocomplete="off" inputmode="numeric">
      </div>
      <button type="submit" class="btn btn-primary btn-lg auth-submit" id="admin-btn">Accéder au panneau admin</button>
    </form>

    <!-- RESET FORM -->
    <form class="auth-form" id="form-reset" style="display:none" onsubmit="handleReset(event)">
      <p style="font-size:14px;color:var(--ink-soft)">Entrez votre email pour recevoir un lien de réinitialisation.</p>
      <div class="fld">
        <label>Email</label>
        <input type="email" id="reset-email" required placeholder="marie@exemple.com">
      </div>
      <button type="submit" class="btn btn-primary btn-lg auth-submit">Envoyer le lien</button>
      <button type="button" class="btn btn-outline" style="width:100%;justify-content:center" onclick="switchTab('login')">← Retour à la connexion</button>
    </form>
  </div>

  <div class="auth-footer">
    <a href="index.html">← Retour à l'accueil</a>
    &nbsp;·&nbsp;
    <a href="faq.html">Aide</a>
  </div>
</div>

<script type="module">
import { supabase } from './js/imm-shared.js';

const params = new URLSearchParams(window.location.search);
if (params.get('mode') === 'signup') switchTab('signup');

supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'dashboard.html';
});

window.switchTab = function(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('form-reset').style.display = tab === 'reset' ? '' : 'none';
  document.getElementById('form-admin').style.display = tab === 'admin' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('tab-admin').classList.toggle('active', tab === 'admin');
  clearMessages();
};

window.switchTab(params.get('mode') === 'signup' ? 'signup' : 'login');

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('auth-success').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('auth-error').style.display = 'none';
}
function clearMessages() {
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

window.handleLogin = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Connexion…';
  clearMessages();

  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('login-email').value.trim(),
    password: document.getElementById('login-password').value
  });

  if (error) {
    showError(error.message === 'Invalid login credentials' ? 'Email ou mot de passe incorrect.' : error.message);
    btn.disabled = false; btn.textContent = 'Se connecter';
  } else {
    const redirect = params.get('redirect') || 'dashboard.html';
    window.location.href = redirect;
  }
};

window.handleSignup = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'Création…';
  clearMessages();

  const fn = document.getElementById('signup-firstname').value.trim();
  const ln = document.getElementById('signup-lastname').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;

  if (password.length < 8) {
    showError('Le mot de passe doit contenir au moins 8 caractères.');
    btn.disabled = false; btn.textContent = 'Créer mon compte gratuitement';
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: { data: { full_name: `${fn} ${ln}`.trim() } }
  });

  if (error) {
    showError(error.message);
    btn.disabled = false; btn.textContent = 'Créer mon compte gratuitement';
  } else if (data.session) {
    window.location.href = params.get('redirect') || 'dashboard.html';
  } else {
    showSuccess('Compte créé ! Connectez-vous avec vos identifiants.');
    switchTab('login');
    document.getElementById('login-email').value = email;
    btn.disabled = false; btn.textContent = 'Créer mon compte gratuitement';
  }
};

window.handleReset = async function(e) {
  e.preventDefault();
  clearMessages();
  const email = document.getElementById('reset-email').value.trim();
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html?mode=update-password'
  });
  if (error) showError(error.message);
  else showSuccess('Email de réinitialisation envoyé. Vérifiez votre boîte mail.');
};

window.handleAdminLogin = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('admin-btn');
  btn.disabled = true; btn.textContent = 'Vérification…';
  clearMessages();

  const username = document.getElementById('admin-username').value.trim();
  const pin = document.getElementById('admin-pin').value;

  try {
    const res = await fetch(`${import.meta.env.VITE_SUPABASE_URL}/functions/v1/admin-auth`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${import.meta.env.VITE_SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify({ username, pin })
    });

    const json = await res.json();

    if (!res.ok || json.error) {
      showError(json.error || 'Identifiants incorrects.');
      btn.disabled = false; btn.textContent = 'Accéder au panneau admin';
    } else {
      sessionStorage.setItem('imm-admin', JSON.stringify({ username: json.username, role: json.role }));
      window.location.href = 'dashboard.html';
    }
  } catch {
    showError('Erreur de connexion. Réessayez.');
    btn.disabled = false; btn.textContent = 'Accéder au panneau admin';
  }
};

window.checkStrength = function(pwd) {
  const fill = document.getElementById('strength-fill');
  let score = 0;
  if (pwd.length >= 8) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^a-zA-Z0-9]/.test(pwd)) score++;
  const widths = ['0%', '25%', '50%', '75%', '100%'];
  const colors = ['', '#DC2626', '#D97706', '#16A34A', '#16A34A'];
  fill.style.width = widths[score];
  fill.style.background = colors[score];
};
</script>
</body>
</html>
